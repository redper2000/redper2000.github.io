<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>时间照相馆 · 线条色块画廊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动干扰 */
        }

        body {
            background: #000000;  /* 纯黑背景，天花板/深邃感 */
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* 主画廊容器 - 固定视角的房间 */
        .gallery-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;  /* 透视深度，产生空间感 */
            perspective-origin: 50% 45%;
            background: #000000;
        }

        /* 房间容器：模拟三面墙的3D空间 */
        .room {
            position: relative;
            width: 900px;
            height: 600px;
            transform-style: preserve-3d;
            transform: translateZ(0) rotateX(0deg);
            transition: all 0.3s ease;
        }

        /* 共用墙面样式 */
        .wall {
            position: absolute;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.9), 0 0 0 4px #000000;  /* 黑色线条边框 */
            transition: background-color 0.2s, background-image 0.2s;
        }

        /* 正面墙 (正对观看者) */
        .wall-front {
            width: 100%;
            height: 100%;
            transform: translateZ(300px);
            background-color: #d9c8b2;  /* 基础米色，会被js动态替换 */
            background-position: center;
            background-size: cover;
            box-shadow: 0 0 0 4px #000, inset 0 0 0 3px #000;
        }

        /* 左侧墙 (向右倾斜) */
        .wall-left {
            width: 400px;
            height: 100%;
            transform: rotateY(90deg) translateX(-200px) translateZ(150px);
            transform-origin: left center;
            background-color: #b13e3e;
            right: auto;
            left: -200px;
            top: 0;
            box-shadow: inset 0 0 0 3px #000, 2px 0 0 0 #000;
        }

        /* 右侧墙 (向左倾斜) */
        .wall-right {
            width: 400px;
            height: 100%;
            transform: rotateY(-90deg) translateX(200px) translateZ(150px);
            transform-origin: right center;
            background-color: #2c4763;
            right: -200px;
            top: 0;
            box-shadow: inset 0 0 0 3px #000, -2px 0 0 0 #000;
        }

        /* 地面线框 (装饰黑色线条感) */
        .floor-lines {
            position: absolute;
            bottom: -80px;
            width: 100%;
            height: 80px;
            transform: rotateX(70deg) translateY(40px);
            background: repeating-linear-gradient(90deg, #222 0px, #222 2px, transparent 2px, transparent 30px);
            opacity: 0.5;
            pointer-events: none;
        }

        /* 天花板黑色横条 (加强结构) */
        .ceiling-line {
            position: absolute;
            top: -30px;
            width: 100%;
            height: 30px;
            background: #000000;
            transform: rotateX(-20deg);
            pointer-events: none;
        }

        /* 相框样式 (照片位置) */
        .photo-frame {
            position: absolute;
            background: #0a0a0a;
            border: 4px solid #000000;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
            background-color: #1a1a1a;
        }
        .photo-frame:hover {
            transform: scale(1.02);
        }
        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 正面画框 (主视觉) */
        .front-photo {
            width: 380px;
            height: 280px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* 左侧墙画框 */
        .left-photo {
            width: 240px;
            height: 200px;
            right: 30px;
            bottom: 40px;
            transform: rotateY(0deg); 
            /* 因为父容器已旋转，这里不需要额外旋转，保持视觉平行于墙面 */
        }

        /* 右侧墙画框 */
        .right-photo {
            width: 240px;
            height: 200px;
            left: 30px;
            bottom: 40px;
        }

        /* 月份标签 (挂在正面墙顶部) */
        .month-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            padding: 6px 16px;
            border-radius: 40px;
            color: #f5e7d9;
            font-weight: 500;
            letter-spacing: 2px;
            font-size: 1rem;
            border-left: 3px solid #d4af7a;
            z-index: 20;
            font-family: monospace;
        }

        /* 底部时间轴 (横向滑动) */
        .timeline-footer {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 200;
            pointer-events: none;
        }
        .timeline-track {
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 10px 24px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            max-width: 90vw;
            pointer-events: auto;
            border: 1px solid rgba(255,255,220,0.25);
            scrollbar-width: thin;
        }
        .month-tab {
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 18px;
            border-radius: 40px;
            background: transparent;
            color: #e0d6c8;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: 'Inter', monospace;
            letter-spacing: 1px;
        }
        .month-tab.active {
            background: #c9a87b;
            color: #0a0a0a;
            box-shadow: 0 0 8px rgba(201,168,123,0.6);
        }

        /* 右上角菜单目录按钮 */
        .menu-btn {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 52px;
            height: 52px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            font-size: 26px;
            color: #f0f0f0;
            border: 1px solid rgba(255,255,200,0.3);
            transition: 0.2s;
        }
        .menu-btn:hover {
            background: #1f1b2e;
            border-color: #dbbc87;
        }

        /* 全屏目录黑幕 */
        .directory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Cormorant Garamond', serif;
            overflow-y: auto;
        }
        .dir-container {
            max-width: 800px;
            width: 90%;
            text-align: center;
        }
        .dir-title {
            font-size: 3rem;
            letter-spacing: 6px;
            margin-bottom: 2.5rem;
            color: #e2d4c0;
            border-bottom: 1px solid #3a3a44;
            display: inline-block;
            padding-bottom: 8px;
        }
        .months-dir-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.5rem;
        }
        .dir-item {
            background: rgba(25,25,35,0.7);
            border: 1px solid #4a4a5a;
            padding: 1.2rem;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .dir-item:hover {
            background: #2a2a3a;
            border-color: #c9a87b;
            transform: translateY(-4px);
        }
        .dir-month {
            font-size: 1.8rem;
            font-weight: 500;
            color: #efdfc7;
        }
        .dir-abbr {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #b89a70;
            margin-top: 6px;
        }
        .close-dir {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 2rem;
            cursor: pointer;
            color: #aaa;
        }
        .close-dir:hover {
            color: white;
        }

        /* 音乐按钮 (右下角) */
        .music-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 22px;
            color: #f0e0ce;
            border: 1px solid rgba(255,255,200,0.3);
        }
        .music-btn.playing {
            color: #ffdd99;
            border-color: #e7bc7e;
        }

        @media (max-width: 800px) {
            .room { transform: scale(0.7); width: 900px; height: 600px; }
            .month-tab { font-size: 0.7rem; padding: 4px 12px; }
        }
        @media (max-width: 600px) {
            .room { transform: scale(0.55); }
        }
    </style>
</head>
<body>

<div class="gallery-stage">
    <div class="room" id="roomContainer">
        <!-- 三面墙 -->
        <div class="wall wall-front" id="frontWall"></div>
        <div class="wall wall-left" id="leftWall"></div>
        <div class="wall wall-right" id="rightWall"></div>
        <!-- 地面装饰线 -->
        <div class="floor-lines"></div>
        <div class="ceiling-line"></div>
        
        <!-- 相框位置 (正面照片) -->
        <div class="photo-frame front-photo" id="frontPhotoFrame">
            <img id="frontImg" alt="正面照片" src="">
        </div>
        <!-- 左侧墙照片 -->
        <div class="photo-frame left-photo" id="leftPhotoFrame">
            <img id="leftImg" alt="左侧照片" src="">
        </div>
        <!-- 右侧墙照片 -->
        <div class="photo-frame right-photo" id="rightPhotoFrame">
            <img id="rightImg" alt="右侧照片" src="">
        </div>
        <!-- 月份标识 -->
        <div class="month-badge" id="monthBadge">一月 · JAN</div>
    </div>
</div>

<!-- 底部时间轴 -->
<div class="timeline-footer">
    <div class="timeline-track" id="timelineTrack"></div>
</div>

<!-- 右上角目录按钮 -->
<div class="menu-btn" id="menuBtn">☰</div>

<!-- 音乐控制 -->
<div class="music-btn" id="musicBtn">🎵</div>

<!-- 全屏目录 -->
<div id="directoryOverlay" class="directory-overlay">
    <div class="close-dir" id="closeDirBtn">✕</div>
    <div class="dir-container">
        <div class="dir-title">时光目录</div>
        <div class="months-dir-grid" id="dirGrid"></div>
    </div>
</div>

<script>
    // ============================================================
    // 1. 定义每个月的数据：墙面主色调 + 照片地址 (正面+左侧+右侧)
    // 颜色按照高级红/蓝/米色循环，纯黑线条自动由css边框表现
    // ============================================================
    const monthsData = [
        { name: "一月", abbr: "JAN", color: "#b13e3e", front: "https://picsum.photos/id/13/800/600", left: "https://picsum.photos/id/15/600/500", right: "https://picsum.photos/id/20/600/500" },
        { name: "二月", abbr: "FEB", color: "#2c4763", front: "https://picsum.photos/id/26/800/600", left: "https://picsum.photos/id/28/600/500", right: "https://picsum.photos/id/29/600/500" },
        { name: "三月", abbr: "MAR", color: "#d7bd92", front: "https://picsum.photos/id/96/800/600", left: "https://picsum.photos/id/34/600/500", right: "https://picsum.photos/id/42/600/500" },
        { name: "四月", abbr: "APR", color: "#9e3c3c", front: "https://picsum.photos/id/47/800/600", left: "https://picsum.photos/id/59/600/500", right: "https://picsum.photos/id/64/600/500" },
        { name: "五月", abbr: "MAY", color: "#2a5f7a", front: "https://picsum.photos/id/169/800/600", left: "https://picsum.photos/id/91/600/500", right: "https://picsum.photos/id/100/600/500" },
        { name: "六月", abbr: "JUN", color: "#e1caa7", front: "https://picsum.photos/id/30/800/600", left: "https://picsum.photos/id/44/600/500", right: "https://picsum.photos/id/45/600/500" },
        { name: "七月", abbr: "JUL", color: "#ad4b4b", front: "https://picsum.photos/id/155/800/600", left: "https://picsum.photos/id/120/600/500", right: "https://picsum.photos/id/123/600/500" },
        { name: "八月", abbr: "AUG", color: "#315d82", front: "https://picsum.photos/id/22/800/600", left: "https://picsum.photos/id/39/600/500", right: "https://picsum.photos/id/52/600/500" },
        { name: "九月", abbr: "SEP", color: "#cfb787", front: "https://picsum.photos/id/104/800/600", left: "https://picsum.photos/id/106/600/500", right: "https://picsum.photos/id/108/600/500" },
        { name: "十月", abbr: "OCT", color: "#b24444", front: "https://picsum.photos/id/116/800/600", left: "https://picsum.photos/id/118/600/500", right: "https://picsum.photos/id/119/600/500" },
        { name: "十一月", abbr: "NOV", color: "#2c5a73", front: "https://picsum.photos/id/127/800/600", left: "https://picsum.photos/id/129/600/500", right: "https://picsum.photos/id/131/600/500" },
        { name: "十二月", abbr: "DEC", color: "#dac29c", front: "https://picsum.photos/id/142/800/600", left: "https://picsum.photos/id/145/600/500", right: "https://picsum.photos/id/146/600/500" }
    ];

    // 获取DOM元素
    const frontWall = document.getElementById('frontWall');
    const leftWall = document.getElementById('leftWall');
    const rightWall = document.getElementById('rightWall');
    const frontImg = document.getElementById('frontImg');
    const leftImg = document.getElementById('leftImg');
    const rightImg = document.getElementById('rightImg');
    const monthBadge = document.getElementById('monthBadge');
    
    let currentMonthIndex = 0;  // 0-11

    // 更新墙面颜色+照片+标签
    function switchToMonth(index) {
        const data = monthsData[index];
        if (!data) return;
        // 更新三面墙背景色 (纯色色块，黑色线条由css负责)
        frontWall.style.backgroundColor = data.color;
        leftWall.style.backgroundColor = data.color;
        rightWall.style.backgroundColor = data.color;
        
        // 更新照片 (正面，左侧，右侧)
        frontImg.src = data.front;
        leftImg.src = data.left;
        rightImg.src = data.right;
        
        // 月份标识
        monthBadge.innerHTML = `${data.name} · ${data.abbr}`;
        
        // 底部tab激活样式
        document.querySelectorAll('.month-tab').forEach((tab, idx) => {
            if (idx === index) tab.classList.add('active');
            else tab.classList.remove('active');
        });
        currentMonthIndex = index;
    }

    // ---------- 构建底部时间轴 ----------
    const timelineTrack = document.getElementById('timelineTrack');
    monthsData.forEach((month, idx) => {
        const tab = document.createElement('div');
        tab.className = 'month-tab';
        tab.textContent = `${month.abbr} · ${month.name}`;
        tab.dataset.idx = idx;
        tab.addEventListener('click', (e) => {
            e.stopPropagation();
            switchToMonth(idx);
        });
        timelineTrack.appendChild(tab);
    });
    
    // ---------- 全屏目录 (黑色画布 + 月份+英文简写) ----------
    const dirOverlay = document.getElementById('directoryOverlay');
    const dirGrid = document.getElementById('dirGrid');
    const menuBtn = document.getElementById('menuBtn');
    const closeDirBtn = document.getElementById('closeDirBtn');
    
    monthsData.forEach((month, idx) => {
        const dirItem = document.createElement('div');
        dirItem.className = 'dir-item';
        dirItem.innerHTML = `<div class="dir-month">${month.name}</div><div class="dir-abbr">${month.abbr}</div>`;
        dirItem.addEventListener('click', () => {
            dirOverlay.style.display = 'none';
            switchToMonth(idx);
        });
        dirGrid.appendChild(dirItem);
    });
    
    menuBtn.addEventListener('click', () => {
        dirOverlay.style.display = 'flex';
    });
    closeDirBtn.addEventListener('click', () => {
        dirOverlay.style.display = 'none';
    });
    dirOverlay.addEventListener('click', (e) => {
        if (e.target === dirOverlay) dirOverlay.style.display = 'none';
    });
    
    // 初始化默认一月
    switchToMonth(0);
    
    // ---------- 轻量BGM控制 (示例优雅音乐) ----------
    const musicBtn = document.getElementById('musicBtn');
    let audio = null;
    let playing = false;
    musicBtn.addEventListener('click', () => {
        if (!audio) {
            audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3');
            audio.loop = true;
            audio.volume = 0.3;
        }
        if (playing) {
            audio.pause();
            musicBtn.classList.remove('playing');
            musicBtn.innerHTML = '🎵';
        } else {
            audio.play().catch(e => console.log("需要用户交互", e));
            musicBtn.classList.add('playing');
            musicBtn.innerHTML = '🎶';
        }
        playing = !playing;
    });
    
    // 可选：点击照片放大预览（简易弹框）
    function addPhotoZoom(imgElement, src) {
        imgElement.parentElement.addEventListener('click', (e) => {
            e.stopPropagation();
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = 0;
            modal.style.left = 0;
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.9)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = 3000;
            modal.style.cursor = 'pointer';
            const bigImg = document.createElement('img');
            bigImg.src = src;
            bigImg.style.maxWidth = '85%';
            bigImg.style.maxHeight = '85%';
            bigImg.style.borderRadius = '12px';
            bigImg.style.boxShadow = '0 0 30px rgba(0,0,0,0.5)';
            modal.appendChild(bigImg);
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        });
    }
    addPhotoZoom(frontImg, monthsData[0].front);
    addPhotoZoom(leftImg, monthsData[0].left);
    addPhotoZoom(rightImg, monthsData[0].right);
    // 动态更新时重置预览（简单处理：每次切换后重新绑定新src的预览）
    function rebindZoom() {
        addPhotoZoom(frontImg, frontImg.src);
        addPhotoZoom(leftImg, leftImg.src);
        addPhotoZoom(rightImg, rightImg.src);
    }
    const origSwitch = switchToMonth;
    window.switchToMonth = function(idx) {
        origSwitch(idx);
        setTimeout(rebindZoom, 50);
    };
    switchToMonth = function(idx) {
        origSwitch(idx);
        setTimeout(rebindZoom, 50);
    };
    rebindZoom();
</script>
</body>
</html>
