<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PHOTO</title>
    <style>
        /* ================= 全局重置 & 字体 ================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            /* 中文字体：宋体；英文字体：黑体 */
            font-family: 'SimHei', 'Microsoft YaHei', '黑体', 'Helvetica Neue', 'Arial', sans-serif;
            background: #102b3f;  /* 普鲁士蓝基底 */
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ================= 普鲁士蓝同心圆波浪扩散动画 ================= */
        .ripple-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 30% 40%, rgba(44, 95, 122, 0.2) 0%, #0a2a3b 80%);
            overflow: hidden;
        }

        /* 动态同心圆波纹 (三层) */
        .wave-circle {
            position: absolute;
            border-radius: 50%;
            background: transparent;
            border: 3px solid rgba(255, 255, 245, 0.5);
            width: 0;
            height: 0;
            left: 30%;
            top: 40%;
            transform: translate(-50%, -50%);
            animation: rippleExpand 12s infinite ease-out;
            box-shadow: 0 0 0 2px rgba(240, 230, 200, 0.2);
        }

        .wave-circle:nth-child(1) {
            animation-delay: 0s;
            border-width: 4px;
            border-color: rgba(255, 235, 190, 0.6);
        }
        .wave-circle:nth-child(2) {
            animation-delay: 3s;
            border-width: 3px;
            border-color: rgba(210, 180, 140, 0.7);
        }
        .wave-circle:nth-child(3) {
            animation-delay: 6s;
            border-width: 5px;
            border-color: rgba(255, 215, 140, 0.5);
        }
        .wave-circle:nth-child(4) {
            animation-delay: 9s;
            border-width: 2px;
            border-color: rgba(200, 170, 110, 0.6);
        }

        @keyframes rippleExpand {
            0% {
                width: 0px;
                height: 0px;
                opacity: 0.8;
            }
            40% {
                opacity: 0.6;
            }
            100% {
                width: 120vw;
                height: 120vw;
                opacity: 0;
            }
        }

        /* 额外飘逸波浪线 (粗线条动画) */
        .line-waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: repeating-linear-gradient(105deg, 
                transparent, 
                transparent 38px, 
                rgba(255, 250, 210, 0.35) 38px, 
                rgba(255, 240, 180, 0.5) 46px,
                transparent 46px,
                transparent 80px);
            pointer-events: none;
            z-index: 1;
            transform: skewY(-2deg);
            animation: slideWave 14s linear infinite;
        }

        @keyframes slideWave {
            0% { background-position: 0 0; }
            100% { background-position: 200px 80px; }
        }

        /* ================= 主容器 (z-index提升) ================= */
        .archive {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
        }

        /* 左上角大标题 — 只保留 PHOTO */
        .main-title {
            position: fixed;
            top: 2rem;
            left: 2.5rem;
            z-index: 30;
            font-family: 'Helvetica Neue', '黑体', 'Arial Black', sans-serif;
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: #f0ede8;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            background: none;
            backdrop-filter: blur(2px);
            pointer-events: none;
        }

        /* 月份导航栏：横向并列，无边框无背景，纯文本大写字重 */
        .months-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 0.8rem;
            margin: 0 0 1.5rem 0;
            padding-top: 0.5rem;
            border: none;
            background: transparent;
        }
        .month-btn {
            background: transparent;
            border: none;
            font-family: 'Helvetica Neue', '黑体', 'Arial Black', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #f2efe0;
            text-transform: uppercase;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            transition: all 0.2s ease;
            border-radius: 0;
            opacity: 0.75;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .month-btn:hover {
            opacity: 1;
            color: #ffdd99;
            transform: translateY(-2px);
        }
        .month-btn.active {
            opacity: 1;
            color: #ffc285;
            border-bottom: 2.5px solid #ffb347;
            font-weight: 900;
        }

        /* 照片网格区域 — 无边框无圆角，悬浮，不带白边 */
        .photos-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 2rem 1.5rem;
            margin-top: 2rem;
            animation: fadeUp 0.4s ease;
        }
        .photos-grid.active-grid {
            display: grid;
        }

        /* 每个照片项：彻底无边框，无白边，悬浮阴影细腻 */
        .photo-item {
            background: transparent;     /* 完全无背景 */
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            border-radius: 0px;
            box-shadow: none;
        }
        .photo-item:hover {
            transform: translateY(-6px);
            filter: drop-shadow(0 18px 18px rgba(0, 0, 0, 0.2));
        }
        /* 照片本身无任何边框 / 白边 */
        .photo-img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: contain;
            display: block;
            background: transparent;      /* 彻底透明背景, 不产生白边 */
            border: none;
            outline: none;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            transition: 0.2s;
        }
        .photo-caption {
            padding: 0.6rem 0 0.2rem;
            font-size: 0.78rem;
            text-align: center;
            color: #f2e8da;
            font-weight: 500;
            background: transparent;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        /* 空月份优雅占位 */
        .empty-album {
            text-align: center;
            padding: 2.5rem;
            font-size: 1.1rem;
            color: #ccddee;
            font-weight: 500;
            background: rgba(10, 35, 50, 0.55);
            backdrop-filter: blur(4px);
            border-left: 4px solid #ffbe76;
        }

        /* 简洁箭头 (无多余文字) */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin: 2rem 0 1rem;
        }
        .arrow-nav {
            width: 44px;
            height: 44px;
            background: rgba(30, 55, 70, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 230, 180, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffefcf;
        }
        .arrow-nav:hover {
            background: #b96f30;
            border-color: #ffd58c;
            transform: scale(1.02);
        }

        /* 模态框 (大图无边框) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 28, 40, 0.96);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-img {
            max-width: 85%;
            max-height: 85%;
            border: none;
            background: transparent;
            box-shadow: 0 0 0 2px rgba(255, 210, 120, 0.5);
        }
        .modal-caption {
            margin-top: 1rem;
            color: #fae6c3;
            background: rgba(0, 0, 0, 0.45);
            padding: 0.3rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .close-modal-icon {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 1.8rem;
            color: #f3e3ca;
            background: rgba(0, 0, 0, 0.4);
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #dfb87a;
        }
        .close-modal-icon:hover {
            background: #b3512a;
            border-color: #ffe0aa;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式缩小标题与间距 */
        @media (max-width: 820px) {
            .main-title { font-size: 2rem; top: 1.2rem; left: 1.5rem; }
            .archive { padding: 1rem; }
            .photos-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
            .month-btn { font-size: 0.7rem; padding: 0.2rem 0.4rem; }
            .months-nav { justify-content: flex-end; gap: 0.4rem; margin-top: 0.8rem; }
        }
    </style>
</head>
<body>

<!-- 普鲁士蓝基底同心圆波浪动画层 -->
<div class="ripple-bg">
    <div class="wave-circle"></div>
    <div class="wave-circle"></div>
    <div class="wave-circle"></div>
    <div class="wave-circle"></div>
</div>
<div class="line-waves"></div>

<div class="archive">
    <!-- 左上角大标题只保留 PHOTO -->
    <div class="main-title">PHOTO</div>

    <!-- 月份导航：无边框无背景，纯并列文字 -->
    <div class="months-nav" id="monthsNav"></div>

    <!-- 照片网格容器 -->
    <div id="photoGridContainer" class="photos-grid"></div>

    <!-- 极简切换箭头，不带额外文字提示 -->
    <div class="nav-buttons">
        <div class="arrow-nav" id="prevMonthBtn">←</div>
        <div class="arrow-nav" id="nextMonthBtn">→</div>
    </div>
</div>

<!-- 模态框大图预览 -->
<div id="modalOverlay" class="modal-overlay">
    <div class="close-modal-icon" id="closeModalBtn">✕</div>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <img class="modal-img" id="enlargedImg" src="" alt="照片">
        <div id="modalCaptionText" class="modal-caption"></div>
    </div>
</div>

<script>
    // ============================================================
    // 照片数据 (2026年1-12月，每张照片独立url与描述)
    // 无边框无白边设计，照片使用 contain 确保不裁切
    // ============================================================
    const monthsData = [
        { monthNum: 1, nameEn: "JANUARY", photos: [ { url: "https://picsum.photos/id/13/600/450", caption: "元旦晨光" }, { url: "https://picsum.photos/id/15/600/450", caption: "森林雪语" } ] },
        { monthNum: 2, nameEn: "FEBRUARY", photos: [ { url: "https://picsum.photos/id/20/600/450", caption: "情人节絮语" }, { url: "https://picsum.photos/id/26/600/450", caption: "烟火人间" }, { url: "https://picsum.photos/id/28/600/450", caption: "围炉夜" } ] },
        { monthNum: 3, nameEn: "MARCH", photos: [ { url: "https://picsum.photos/id/96/600/450", caption: "樱吹雪" } ] },
        { monthNum: 4, nameEn: "APRIL", photos: [ { url: "https://picsum.photos/id/29/600/450", caption: "细雨呢喃" } ] },
        { monthNum: 5, nameEn: "MAY", photos: [ { url: "https://picsum.photos/id/169/600/450", caption: "远足山海" }, { url: "https://picsum.photos/id/42/600/450", caption: "海岸晚风" } ] },
        { monthNum: 6, nameEn: "JUNE", photos: [ { url: "https://picsum.photos/id/30/600/450", caption: "童梦气球" } ] },
        { monthNum: 7, nameEn: "JULY", photos: [ { url: "https://picsum.photos/id/59/600/450", caption: "盛夏冰语" } ] },
        { monthNum: 8, nameEn: "AUGUST", photos: [ { url: "https://picsum.photos/id/47/600/450", caption: "山野星辰" } ] },
        { monthNum: 9, nameEn: "SEPTEMBER", photos: [ { url: "https://picsum.photos/id/34/600/450", caption: "桂香满径" } ] },
        { monthNum: 10, nameEn: "OCTOBER", photos: [ { url: "https://picsum.photos/id/29/600/450", caption: "银杏金箔" } ] },
        { monthNum: 11, nameEn: "NOVEMBER", photos: [ { url: "https://picsum.photos/id/64/600/450", caption: "深秋炉火" } ] },
        { monthNum: 12, nameEn: "DECEMBER", photos: [ { url: "https://picsum.photos/id/91/600/450", caption: "圣诞颂歌" }, { url: "https://picsum.photos/id/100/600/450", caption: "跨年星火" } ] }
    ];

    // DOM 元素
    const monthsNav = document.getElementById('monthsNav');
    const photoGridContainer = document.getElementById('photoGridContainer');
    const prevBtn = document.getElementById('prevMonthBtn');
    const nextBtn = document.getElementById('nextMonthBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const enlargedImg = document.getElementById('enlargedImg');
    const modalCaptionText = document.getElementById('modalCaptionText');
    const closeModalBtn = document.getElementById('closeModalBtn');

    let currentMonthIndex = 0;

    // 渲染月份导航 (无边框，无背景，并列)
    function renderNav() {
        monthsNav.innerHTML = '';
        monthsData.forEach((month, idx) => {
            const btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.textContent = month.nameEn;   // 全大写
            if (idx === currentMonthIndex) btn.classList.add('active');
            btn.addEventListener('click', () => setActiveMonth(idx));
            monthsNav.appendChild(btn);
        });
    }

    // 渲染照片网格 (完全无边框无白边)
    function renderPhotos() {
        const currentMonth = monthsData[currentMonthIndex];
        const photos = currentMonth.photos;
        photoGridContainer.innerHTML = '';
        photoGridContainer.classList.add('active-grid');

        if (!photos || photos.length === 0) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-album';
            emptyDiv.textContent = '✨ 此刻静默 · 待光影 ✨';
            photoGridContainer.appendChild(emptyDiv);
            return;
        }

        photos.forEach(photo => {
            const card = document.createElement('div');
            card.className = 'photo-item';
            const img = document.createElement('img');
            img.src = photo.url;
            img.alt = photo.caption;
            img.className = 'photo-img';
            img.loading = 'lazy';
            const captionSpan = document.createElement('div');
            captionSpan.className = 'photo-caption';
            captionSpan.textContent = photo.caption;
            card.appendChild(img);
            card.appendChild(captionSpan);
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                openModal(photo.url, photo.caption);
            });
            photoGridContainer.appendChild(card);
        });
    }

    function setActiveMonth(index) {
        if (index === currentMonthIndex) return;
        currentMonthIndex = index;
        // 更新按钮样式
        const btns = document.querySelectorAll('.month-btn');
        btns.forEach((btn, i) => {
            if (i === currentMonthIndex) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        renderPhotos();
        photoGridContainer.style.animation = 'none';
        setTimeout(() => { photoGridContainer.style.animation = 'fadeUp 0.35s ease'; }, 10);
    }

    function nextMonth() { let n = (currentMonthIndex + 1) % monthsData.length; setActiveMonth(n); }
    function prevMonth() { let p = (currentMonthIndex - 1 + monthsData.length) % monthsData.length; setActiveMonth(p); }

    // 模态框
    function openModal(url, caption) {
        enlargedImg.src = url;
        modalCaptionText.textContent = caption || '光影瞬间';
        modalOverlay.style.display = 'flex';
    }
    function closeModal() { modalOverlay.style.display = 'none'; }

    // 键盘与箭头监听
    document.addEventListener('keydown', (e) => {
        if (modalOverlay.style.display === 'flex') {
            if (e.key === 'Escape') closeModal();
            return;
        }
        if (e.key === 'ArrowLeft') prevMonth();
        if (e.key === 'ArrowRight') nextMonth();
    });
    prevBtn.addEventListener('click', prevMonth);
    nextBtn.addEventListener('click', nextMonth);
    closeModalBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

    // 初始化
    renderNav();
    renderPhotos();
</script>
</body>
</html>
