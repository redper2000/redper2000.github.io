<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>光影记忆 · 折叠相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1e;  /* 深色电影感背景 */
            font-family: 'Segoe UI', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            padding: 2rem 1rem;
            color: #eef2ff;
        }

        /* 主容器 */
        .album-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-bottom: 1rem;
        }
        .name {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e2e2e2, #b0b3ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .bio {
            color: #9ca3af;
            margin-top: 0.5rem;
            font-size: 1rem;
        }

        /* 横向折叠布局 (Flex 实现手风琴) */
        .accordion {
            display: flex;
            flex-wrap: nowrap;
            gap: 1rem;
            overflow-x: auto;
            padding: 1rem 0.5rem 2rem 0.5rem;
            scroll-behavior: smooth;
            cursor: grab;
            scrollbar-width: thin;
        }
        .accordion:active {
            cursor: grabbing;
        }
        /* 每个月份卡片 */
        .month-card {
            flex: 0 0 90px;          /* 默认折叠宽度 */
            background: rgba(20, 28, 40, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            transition: flex 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* 展开的卡片 */
        .month-card.expanded {
            flex: 1 1 400px;
            cursor: default;
        }

        /* 折叠时的标题区域（竖向文字） */
        .card-header {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 1rem 0;
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #2a3a5e, #1a2638);
            color: #f0f3fa;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        .month-card.expanded .card-header {
            writing-mode: horizontal-tb;
            padding: 1rem 1.5rem;
            justify-content: flex-start;
            font-size: 1.5rem;
            background: rgba(40, 55, 80, 0.9);
            border-bottom: 2px solid #ffd966;
        }

        /* 展开后的内容区域 */
        .card-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease 0.1s, visibility 0.3s;
            padding: 0 1rem 1rem 1rem;
            overflow-y: auto;
            max-height: 65vh;
        }
        .month-card.expanded .card-content {
            opacity: 1;
            visibility: visible;
        }

        /* 照片网格 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .photo-item {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .photo-item:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 20px rgba(0,0,0,0.4);
        }
        .photo-img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }
        .photo-caption {
            padding: 8px;
            font-size: 0.75rem;
            text-align: center;
            background: rgba(0,0,0,0.6);
            color: #ddd;
            font-weight: 400;
        }

        .empty-hint {
            text-align: center;
            padding: 2rem;
            color: #aaa;
            font-style: italic;
        }

        /* 模态框 (大图预览) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            cursor: pointer;
        }
        .modal-img {
            max-width: 85%;
            max-height: 85%;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .modal-caption {
            margin-top: 1rem;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .close-modal {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2rem;
            color: white;
            background: rgba(0,0,0,0.5);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal:hover {
            background: #ef4444;
        }

        /* 滚动条美化 */
        .accordion::-webkit-scrollbar {
            height: 6px;
        }
        .accordion::-webkit-scrollbar-track {
            background: #1f2937;
            border-radius: 10px;
        }
        .accordion::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 10px;
        }

        @media (max-width: 800px) {
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .month-card.expanded {
                flex: 1 1 300px;
            }
            .card-header {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="album-container">
    <div class="header">
        <img class="avatar" src="https://picsum.photos/id/64/200/200" alt="头像" onerror="this.src='https://picsum.photos/200/200?random=1'">
        <h1 class="name">小和的时光相册</h1>
        <p class="bio">光影记忆 · 每一帧都是故事</p>
    </div>

    <!-- 横向折叠区域 -->
    <div class="accordion" id="accordion"></div>
</div>

<!-- 模态框 -->
<div id="modal" class="modal">
    <span class="close-modal">&times;</span>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <img class="modal-img" id="modalImage">
        <div id="modalCaption" class="modal-caption"></div>
    </div>
</div>

<script>
    // ---------- 照片数据（2026年，按月分组）----------
    const photos = [
        { year: 2026, month: 1, url: "https://picsum.photos/id/13/400/300", caption: "元旦的日出" },
        { year: 2026, month: 1, url: "https://picsum.photos/id/15/400/300", caption: "森林雪景" },
        { year: 2026, month: 2, url: "https://picsum.photos/id/20/400/300", caption: "情人节礼物" },
        { year: 2026, month: 2, url: "https://picsum.photos/id/26/400/300", caption: "春节烟花" },
        { year: 2026, month: 2, url: "https://picsum.photos/id/28/400/300", caption: "团圆饭" },
        { year: 2026, month: 3, url: "https://picsum.photos/id/96/400/300", caption: "樱花盛开" },
        { year: 2026, month: 5, url: "https://picsum.photos/id/169/400/300", caption: "劳动节郊游" },
        { year: 2026, month: 5, url: "https://picsum.photos/id/42/400/300", caption: "海边露营" },
        { year: 2026, month: 6, url: "https://picsum.photos/id/30/400/300", caption: "儿童节气球" },
        { year: 2026, month: 7, url: "https://picsum.photos/id/59/400/300", caption: "夏日冰淇淋" },
        { year: 2026, month: 8, url: "https://picsum.photos/id/47/400/300", caption: "登山望远" },
        { year: 2026, month: 9, url: "https://picsum.photos/id/34/400/300", caption: "开学季" },
        { year: 2026, month: 10, url: "https://picsum.photos/id/29/400/300", caption: "国庆灯笼" },
        { year: 2026, month: 11, url: "https://picsum.photos/id/64/400/300", caption: "银杏叶" },
        { year: 2026, month: 12, url: "https://picsum.photos/id/91/400/300", caption: "圣诞派对" },
        { year: 2026, month: 12, url: "https://picsum.photos/id/100/400/300", caption: "跨年倒计时" }
    ];

    const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];

    // 按月份分组 (1~12)
    function groupByMonth(photoArray) {
        const groups = {};
        for (let i = 1; i <= 12; i++) groups[i] = [];
        photoArray.forEach(p => {
            if (p.year === 2026 && p.month >= 1 && p.month <= 12) {
                groups[p.month].push(p);
            }
        });
        return groups;
    }

    // 模态框逻辑
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modalImage');
    const modalCaptionDiv = document.getElementById('modalCaption');
    const closeModalBtn = document.querySelector('.close-modal');
    function openModal(imgUrl, caption) {
        modal.style.display = 'flex';
        modalImage.src = imgUrl;
        modalCaptionDiv.textContent = caption || '';
    }
    function closeModal() {
        modal.style.display = 'none';
    }
    closeModalBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') closeModal();
    });

    // 生成月份卡片
    function buildAccordion() {
        const groups = groupByMonth(photos);
        const container = document.getElementById('accordion');
        container.innerHTML = '';

        for (let month = 1; month <= 12; month++) {
            const monthPhotos = groups[month] || [];
            const card = document.createElement('div');
            card.className = 'month-card';
            card.dataset.month = month;

            // 头部（折叠时显示月份）
            const header = document.createElement('div');
            header.className = 'card-header';
            header.textContent = monthNames[month-1];
            card.appendChild(header);

            // 内容区域（展开后）
            const contentDiv = document.createElement('div');
            contentDiv.className = 'card-content';

            if (monthPhotos.length === 0) {
                contentDiv.innerHTML = `<div class="empty-hint">✨ 这个月暂无照片，等你去记录～</div>`;
            } else {
                const grid = document.createElement('div');
                grid.className = 'photo-grid';
                monthPhotos.forEach(photo => {
                    const item = document.createElement('div');
                    item.className = 'photo-item';
                    const img = document.createElement('img');
                    img.src = photo.url;
                    img.alt = photo.caption;
                    img.className = 'photo-img';
                    img.loading = 'lazy';
                    const captionDiv = document.createElement('div');
                    captionDiv.className = 'photo-caption';
                    captionDiv.textContent = photo.caption || '无标题';
                    item.appendChild(img);
                    item.appendChild(captionDiv);
                    item.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openModal(photo.url, photo.caption);
                    });
                    grid.appendChild(item);
                });
                contentDiv.appendChild(grid);
            }
            card.appendChild(contentDiv);

            // 点击卡片切换展开/折叠
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                // 如果点击的是照片项内部的元素，不切换卡片状态（已阻止冒泡，但安全起见）
                if (e.target.closest('.photo-item')) return;
                const isExpanded = card.classList.contains('expanded');
                if (!isExpanded) {
                    // 折叠其他所有卡片
                    document.querySelectorAll('.month-card').forEach(c => c.classList.remove('expanded'));
                    card.classList.add('expanded');
                    // 平滑滚动到当前卡片
                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                } else {
                    // 如果已经展开，点击折叠（可选，也可以保持展开再点击折叠）
                    card.classList.remove('expanded');
                }
            });
            container.appendChild(card);
        }
        // 默认展开第一个有照片的月份（让效果更明显）
        const firstNonEmpty = Array.from(document.querySelectorAll('.month-card')).find(card => {
            const month = parseInt(card.dataset.month);
            return groups[month] && groups[month].length > 0;
        });
        if (firstNonEmpty) {
            firstNonEmpty.classList.add('expanded');
            setTimeout(() => {
                firstNonEmpty.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }, 100);
        }
    }

    buildAccordion();

    // 可选：添加拖动滚动效果（提升交互）
    const accordion = document.getElementById('accordion');
    let isDown = false;
    let startX;
    let scrollLeft;
    accordion.addEventListener('mousedown', (e) => {
        isDown = true;
        startX = e.pageX - accordion.offsetLeft;
        scrollLeft = accordion.scrollLeft;
    });
    accordion.addEventListener('mouseleave', () => { isDown = false; });
    accordion.addEventListener('mouseup', () => { isDown = false; });
    accordion.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - accordion.offsetLeft;
        const walk = (x - startX) * 1.5;
        accordion.scrollLeft = scrollLeft - walk;
    });
</script>
</body>
</html>
