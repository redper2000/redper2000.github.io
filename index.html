<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>电子照相馆 · 2026时间轴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动干扰，不影响选中文字 */
        }

        body {
            background: #fefaf5;   /* 暖白做旧纸质感 */
            font-family: 'Inter', 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            overflow: hidden;       /* 隐藏全局滚动条，改用横向滚动 */
            height: 100vh;
            width: 100vw;
        }

        /* ---- 横向滚动主容器 ---- */
        .timeline {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            height: 100vh;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: #b9a89a #f0e6dc;
        }
        .timeline::-webkit-scrollbar {
            height: 6px;
        }
        .timeline::-webkit-scrollbar-track {
            background: #f0e6dc;
            border-radius: 8px;
        }
        .timeline::-webkit-scrollbar-thumb {
            background: #b9a89a;
            border-radius: 8px;
        }

        /* 每个月份为一屏 */
        .month-panel {
            flex: 0 0 100vw;
            scroll-snap-align: start;
            overflow-y: auto;
            padding: 2rem 3rem;
            position: relative;
            background: #fefaf5;
            transition: background 0.2s;
        }

        /* 月份标题区 - 艺术感 */
        .month-header {
            text-align: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid #e2dcd5;
            padding-bottom: 1rem;
        }
        .month-name {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 6px;
            color: #2b2a28;
            font-family: 'Times New Roman', serif;
            text-transform: uppercase;
        }
        .year-sub {
            font-size: 0.9rem;
            color: #9e8f83;
            margin-top: 0.25rem;
            letter-spacing: 2px;
        }

        /* 照片网格 - 类似胶片陈列 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
            margin-bottom: 2rem;
        }

        .photo-card {
            background: #ffffffd9;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 22px -12px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.25s;
            cursor: pointer;
            backdrop-filter: blur(2px);
            border: 1px solid #f3ede7;
        }
        .photo-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.2);
        }
        .photo-img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            transition: scale 0.3s;
        }
        .photo-caption {
            padding: 0.8rem;
            font-size: 0.85rem;
            text-align: center;
            color: #4a3f37;
            background: white;
            font-family: system-ui;
            border-top: 1px solid #f3ede7;
        }

        /* 空月份诗意占位 */
        .empty-month {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(245, 240, 235, 0.7);
            border-radius: 48px;
            color: #b9a89a;
            font-style: italic;
            font-size: 1.2rem;
        }

        /* 左侧/右侧导航装饰箭头 (简易悬浮) */
        .nav-arrow {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(190, 170, 150, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #5c4b3a;
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s;
            font-weight: 300;
            border: none;
        }
        .nav-arrow:hover {
            background: rgba(140, 110, 90, 0.6);
            color: white;
        }
        .nav-left {
            left: 20px;
        }
        .nav-right {
            right: 20px;
        }

        /* 全屏模态框 (大图预览) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-content {
            max-width: 85vw;
            max-height: 85vh;
            border-radius: 28px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.4);
        }
        .modal-caption {
            text-align: center;
            color: #eee;
            margin-top: 1rem;
            font-size: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
        }
        .close-modal {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2rem;
            color: white;
            background: rgba(0,0,0,0.4);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-modal:hover {
            background: #b05133;
        }

        /* 底部时间轴小圆点 (指示器) */
        .dot-indicators {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 15;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #d1c2b4;
            border-radius: 50%;
            transition: all 0.2s;
            cursor: pointer;
        }
        .dot.active {
            width: 28px;
            background: #9e7f64;
            border-radius: 12px;
        }

        /* 响应式微调 */
        @media (max-width: 760px) {
            .month-panel {
                padding: 1.5rem;
            }
            .month-name {
                font-size: 2.2rem;
            }
            .photo-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
            .nav-arrow {
                width: 36px;
                height: 36px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<!-- 左右导航箭头 -->
<button class="nav-arrow nav-left" id="prevBtn">←</button>
<button class="nav-arrow nav-right" id="nextBtn">→</button>
<!-- 底部月份指示器 -->
<div class="dot-indicators" id="dotContainer"></div>

<!-- 主时间轴容器 -->
<div class="timeline" id="timeline">
    <!-- 月份面板将由 JS 动态生成，便于管理和数据替换 -->
</div>

<!-- 模态框 -->
<div id="photoModal" class="modal-overlay">
    <span class="close-modal">&times;</span>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <img class="modal-content" id="modalImg" alt="大图">
        <div id="modalCaption" class="modal-caption"></div>
    </div>
</div>

<script>
    // ============================================================
    // 📷📷📷【照片数据区域】请在这里替换您自己的照片链接 ==========
    // ============================================================
    // 格式: { month: 1~12, url: "图片地址", caption: "照片描述" }
    // 您可以根据需要增加或删除照片，月份会自动生成面板。
    // 所有图片建议使用真实可访问的URL（可以放在images文件夹内，比如 "images/jan/01.jpg"）
    // 示例数据包含占位图（LoremFlick / picsum），替换时保留此结构。
    const photosData = [
        // 一月 (January)
        { month: 1, url: "https://picsum.photos/id/13/500/400", caption: "新年初雪 · 静谧庭院" },
        { month: 1, url: "https://picsum.photos/id/15/500/400", caption: "晨雾森林" },
        // 二月
        { month: 2, url: "https://picsum.photos/id/20/500/400", caption: "情人节的手写信" },
        { month: 2, url: "https://picsum.photos/id/26/500/400", caption: "春节烟花漫舞" },
        { month: 2, url: "https://picsum.photos/id/28/500/400", caption: "围炉夜话" },
        // 三月
        { month: 3, url: "https://picsum.photos/id/96/500/400", caption: "樱花隧道" },
        // 四月 (无示例照片 → 会显示诗意占位)
        // 五月
        { month: 5, url: "https://picsum.photos/id/169/500/400", caption: "劳动节远足" },
        { month: 5, url: "https://picsum.photos/id/42/500/400", caption: "海边营地" },
        // 六月
        { month: 6, url: "https://picsum.photos/id/30/500/400", caption: "儿童节气球派对" },
        // 七月
        { month: 7, url: "https://picsum.photos/id/59/500/400", caption: "盛夏冰淇淋车" },
        // 八月
        { month: 8, url: "https://picsum.photos/id/47/500/400", caption: "高山徒步" },
        // 九月
        { month: 9, url: "https://picsum.photos/id/34/500/400", caption: "开学季书店" },
        // 十月
        { month: 10, url: "https://picsum.photos/id/29/500/400", caption: "银杏叶落" },
        // 十一月
        { month: 11, url: "https://picsum.photos/id/64/500/400", caption: "咖啡暖意" },
        // 十二月
        { month: 12, url: "https://picsum.photos/id/91/500/400", caption: "圣诞树影" },
        { month: 12, url: "https://picsum.photos/id/100/500/400", caption: "跨年倒计时" }
    ];

    // ---------- 辅助数据 ----------
    const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
    
    // 按月份整理照片 (1~12)
    function groupPhotosByMonth() {
        const groups = {};
        for (let i = 1; i <= 12; i++) groups[i] = [];
        photosData.forEach(photo => {
            if (photo.month >= 1 && photo.month <= 12) {
                groups[photo.month].push(photo);
            }
        });
        return groups;
    }

    // 创建单个月份面板的DOM
    function createMonthPanel(month, photosList) {
        const panel = document.createElement('div');
        panel.className = 'month-panel';
        panel.dataset.month = month;

        // 标题区
        const headerDiv = document.createElement('div');
        headerDiv.className = 'month-header';
        headerDiv.innerHTML = `
            <div class="month-name">${monthNames[month-1]}</div>
            <div class="year-sub">2026 · ${month} / 12</div>
        `;
        panel.appendChild(headerDiv);

        // 内容区（照片网格或空状态）
        const contentDiv = document.createElement('div');
        if (photosList.length === 0) {
            contentDiv.className = 'empty-month';
            contentDiv.innerText = '✨ 此刻静默 · 等待光影 ✨';
        } else {
            const grid = document.createElement('div');
            grid.className = 'photo-grid';
            photosList.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                const img = document.createElement('img');
                img.src = photo.url;
                img.alt = photo.caption;
                img.className = 'photo-img';
                img.loading = 'lazy';
                const captionSpan = document.createElement('div');
                captionSpan.className = 'photo-caption';
                captionSpan.innerText = photo.caption;
                card.appendChild(img);
                card.appendChild(captionSpan);
                // 点击照片放大预览
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openModal(photo.url, photo.caption);
                });
                grid.appendChild(card);
            });
            contentDiv.appendChild(grid);
        }
        panel.appendChild(contentDiv);
        return panel;
    }

    // 全局变量
    let currentMonthIndex = 0;      // 0-based 月份索引 (0=一月)
    const timeline = document.getElementById('timeline');
    let panels = [];        // 存储所有月份panel元素
    let dots = [];          // 存储小圆点元素

    // 更新指示器高亮
    function updateIndicators(activeIndex) {
        dots.forEach((dot, idx) => {
            if (idx === activeIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    // 滚动到指定月份（平滑）
    function scrollToMonth(index) {
        if (!panels[index]) return;
        panels[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
        currentMonthIndex = index;
        updateIndicators(currentMonthIndex);
    }

    // 监听滚动结束，更新当前月份和指示器
    function bindScrollObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.target.classList.contains('month-panel')) {
                    const idx = panels.findIndex(p => p === entry.target);
                    if (idx !== -1) {
                        currentMonthIndex = idx;
                        updateIndicators(currentMonthIndex);
                    }
                }
            });
        }, { threshold: 0.6 }); // 超过60%可见时切换
        panels.forEach(panel => observer.observe(panel));
    }

    // 模态框逻辑
    const modal = document.getElementById('photoModal');
    const modalImg = document.getElementById('modalImg');
    const modalCaptionSpan = document.getElementById('modalCaption');
    const closeModalBtn = document.querySelector('.close-modal');
    function openModal(imgUrl, caption) {
        modal.style.display = 'flex';
        modalImg.src = imgUrl;
        modalCaptionSpan.innerText = caption || '';
    }
    function closeModalFunc() {
        modal.style.display = 'none';
    }
    closeModalBtn.addEventListener('click', closeModalFunc);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModalFunc();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.style.display === 'flex') closeModalFunc();
    });

    // 构建整个时间轴
    function buildGallery() {
        const groups = groupPhotosByMonth();
        timeline.innerHTML = '';
        panels = [];
        // 按月顺序1-12生成
        for (let month = 1; month <= 12; month++) {
            const monthPhotos = groups[month];
            const panel = createMonthPanel(month, monthPhotos);
            timeline.appendChild(panel);
            panels.push(panel);
        }

        // 生成底部小圆点
        const dotContainer = document.getElementById('dotContainer');
        dotContainer.innerHTML = '';
        dots = [];
        for (let i = 0; i < 12; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.addEventListener('click', () => scrollToMonth(i));
            dotContainer.appendChild(dot);
            dots.push(dot);
        }
        // 默认高亮第一个月份
        updateIndicators(0);
        // 监听滚动以同步dots
        bindScrollObserver();
    }

    // 左右箭头事件
    document.getElementById('prevBtn').addEventListener('click', () => {
        if (currentMonthIndex > 0) scrollToMonth(currentMonthIndex - 1);
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
        if (currentMonthIndex < 11) scrollToMonth(currentMonthIndex + 1);
    });

    // 启动
    buildGallery();
</script>
</body>
</html>
